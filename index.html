<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDL (to-do-list)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 To-do-List 📋</br>Список задач</h1>
        
        <!-- Форма для добавления задачи -->
        <div class="add-task-form">
            <input type="text" id="taskInput" placeholder="Введите новую задачу...">
            <input type="text" id="assigneeInput" placeholder="Кто выполняет?">
            <button id="addButton">Добавить</button>
        </div>
        <!-- Форма для поиска задач -->
        <div class="add-task-form">
            <input type="text" id="searchInput" placeholder="Поиск... (если хотите сбросить поиск, стерите текст и снова нажмите Поиск)">
            <button id="searchButton">Поиск</button>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <!-- Список задач -->
        <ul id="taskList">
            <!-- Задачи будут добавляться сюда через JavaScript -->
        </ul>

        <!-- Счётчик задач -->
        <div class="task-counter">
            <span id="taskCount">Задач: 0</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
